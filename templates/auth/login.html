<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MAIGA GLOBAL SERVICE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1b1ef7, #FFD700);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #1b1ef7;
        }

        .btn-login {
            background-color: #1b1ef7;
            color: white;
        }

        .btn-login:hover {
            background-color: #0000cc;
        }
    </style>
</head>
<body>

<div class="login-card">

    <h3 class="login-title">MAIGA GLOBAL SERVICE</h3>

    <form method="post">
        {% csrf_token %}

        <div class="text-center mb-3">
            {% load static %}
            <img src="{% static 'images/logo.png' %}" width="200" alt="Logo MAIGA GLOBAL SERVICE">
        </div>

        <div class="mb-3">
            <label>Nom d'utilisateur</label>
            {{ form.username }}
        </div>

        <div class="mb-3">
            <label>Mot de passe</label>
            {{ form.password }}
        </div>

        <button type="submit" class="btn btn-login w-100">
            Se connecter
        </button>
    </form>

    {% if form.errors %}
        <div class="alert alert-danger mt-3 text-center">
            Identifiants incorrects
        </div>
    {% endif %}

</div>

</body>
</html>
